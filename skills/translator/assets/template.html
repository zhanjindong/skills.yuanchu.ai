<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{{title}} - 元初AI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:#fff;color:#1a1a1a;min-height:100vh;line-height:1.8;
}

/* ---- Layout ---- */
.content{position:relative;z-index:1;padding:40px 60px;max-width:820px;margin:0 auto;}
.back{display:inline-block;font-size:14px;color:rgba(0,0,0,.4);text-decoration:none;letter-spacing:4px;margin-bottom:40px;transition:color .3s;}
.back:hover{color:#1a1a1a;}
.back::before{content:'← ';}

/* ---- Article Header ---- */
.article-header{margin-bottom:24px;}
.article-header .tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.article-header .tag{font-size:12px;color:#3b82f6;background:#eff6ff;padding:3px 12px;border-radius:20px;letter-spacing:1px;}
.article-header .tag.tag-trans{color:#7c3aed;background:#f5f3ff;}
.article-header h1{font-size:36px;font-weight:700;line-height:1.3;letter-spacing:1px;margin-bottom:16px;}
.article-header .meta{font-size:14px;color:rgba(0,0,0,.4);display:flex;gap:20px;flex-wrap:wrap;}

/* ---- Source Card (原文出处) ---- */
.source-card{background:#f8fafc;border:1px solid #e2e8f0;border-left:4px solid #7c3aed;border-radius:8px;padding:18px 22px;margin-bottom:40px;}
.source-card .source-label{font-size:12px;font-weight:600;color:#7c3aed;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.source-card .source-row{font-size:14px;line-height:1.9;color:#475569;}
.source-card .source-row strong{color:#1e293b;font-weight:600;margin-right:6px;}
.source-card a{color:#3b82f6;text-decoration:none;word-break:break-all;border-bottom:1px solid transparent;transition:border-color .2s;}
.source-card a:hover{border-bottom-color:#3b82f6;}

/* ---- TOC ---- */
.toc{background:#f8fafc;border-radius:8px;padding:20px 28px;margin-bottom:40px;}
.toc-title{font-size:14px;font-weight:600;color:rgba(0,0,0,.5);letter-spacing:2px;margin-bottom:12px;}
.toc a{display:block;font-size:15px;color:#1e293b;text-decoration:none;padding:4px 0;transition:color .2s;}
.toc a:hover{color:#3b82f6;}
.toc a.sub{padding-left:20px;font-size:14px;color:#64748b;}

/* ---- Prose ---- */
.prose h2{font-size:26px;font-weight:700;margin-top:48px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid rgba(0,0,0,.08);}
.prose h3{font-size:20px;font-weight:600;margin-top:32px;margin-bottom:12px;}
.prose h4{font-size:17px;font-weight:600;margin-top:24px;margin-bottom:10px;color:#334155;}
.prose p{font-size:16px;line-height:1.9;color:#334155;margin-bottom:16px;}
.prose ul,.prose ol{padding-left:24px;margin-bottom:16px;}
.prose li{font-size:16px;line-height:1.9;color:#334155;margin-bottom:4px;}
.prose li strong{color:#1e293b;}
.prose strong{color:#1e293b;}
.prose a{color:#3b82f6;text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s;}
.prose a:hover{border-bottom-color:#3b82f6;}
.prose hr{border:none;border-top:1px solid rgba(0,0,0,.08);margin:40px 0;}

/* ---- Code ---- */
.prose code{font-family:"SF Mono",Monaco,"Cascadia Code",Consolas,monospace;font-size:14px;background:#f1f5f9;padding:2px 6px;border-radius:4px;color:#e11d48;}
.prose pre{background:#1e293b;border-radius:8px;padding:20px 24px;margin:16px 0 24px;overflow-x:auto;}
.prose pre code{background:none;color:#e2e8f0;padding:0;font-size:14px;line-height:1.7;}

/* ---- Blockquote ---- */
.prose blockquote{border-left:3px solid rgba(0,0,0,.15);padding:12px 20px;margin:16px 0 24px;color:#64748b;font-size:15px;line-height:1.8;background:#fafafa;border-radius:0 6px 6px 0;}

/* ---- Callouts ---- */
.callout{border-radius:8px;padding:16px 20px;margin:16px 0 24px;font-size:15px;line-height:1.7;}
.callout-title{font-weight:600;margin-bottom:6px;}
.callout-info{background:#eff6ff;border-left:4px solid #3b82f6;color:#1e40af;}
.callout-info .callout-title{color:#3b82f6;}
.callout-warn{background:#fffbeb;border-left:4px solid #f59e0b;color:#92400e;}
.callout-warn .callout-title{color:#f59e0b;}
.callout-tip{background:#f0fdf4;border-left:4px solid #10b981;color:#065f46;}
.callout-tip .callout-title{color:#10b981;}
/* 译者注 */
.callout-note{background:#faf5ff;border-left:4px solid #a855f7;color:#6b21a8;}
.callout-note .callout-title{color:#a855f7;}

/* ---- Table ---- */
.prose table{width:100%;border-collapse:collapse;font-size:15px;margin:16px 0 24px;}
.prose th,.prose td{padding:10px 14px;text-align:left;border-bottom:1px solid #e2e8f0;}
.prose th{background:#f8fafc;font-weight:600;color:#1e293b;white-space:nowrap;}
.prose tr:hover td{background:#f8fafc;}

/* ---- Media（图片 / 视频） ---- */
.prose figure{margin:24px 0;text-align:center;}
.prose figure img{max-width:100%;border-radius:8px;margin:0 auto;display:block;}
.prose figure video{display:block;width:100%;max-width:620px;margin:0 auto;border-radius:8px;background:#000;}
.prose img{max-width:100%;border-radius:8px;margin:16px 0 24px;}
.prose figcaption,.prose .img-caption{text-align:center;font-size:13px;color:#94a3b8;margin-top:8px;}

/* ---- References ---- */
.references{margin-top:48px;padding-top:24px;border-top:1px solid rgba(0,0,0,.08);}
.references h2{font-size:20px;border-bottom:none;margin-top:0;padding-bottom:0;}
.references ol{padding-left:24px;}
.references li{font-size:14px;line-height:1.8;color:#64748b;margin-bottom:4px;}
.references a{color:#3b82f6;font-size:14px;}

/* ---- Footer ---- */
footer{margin-top:80px;padding-top:32px;border-top:1px solid rgba(0,0,0,.1);text-align:center;font-size:12px;color:rgba(0,0,0,.3);padding-bottom:40px;}

/* ---- Mobile ---- */
@media(max-width:768px){
  .content{padding:20px 20px;}
  .article-header h1{font-size:26px;}
  .prose h2{font-size:22px;}
  .prose h3{font-size:18px;}
  .prose pre{padding:14px 16px;}
  .prose pre code{font-size:13px;}
  .prose table{font-size:13px;}
  .prose th,.prose td{padding:8px 10px;}
}
</style>
</head>
<body>

<div class="content">
<a href="index.html" class="back">TECH ARTICLES</a>

<!-- ==================== HEADER ==================== -->
<div class="article-header">
  <div class="tags">
    <span class="tag tag-trans">译文</span>
    <span class="tag">{{tag1}}</span>
    <span class="tag">{{tag2}}</span>
  </div>
  <h1>{{title_zh}}</h1>
  <div class="meta">
    <span>译者：{{translator}}</span>
    <span>{{date}}</span>
  </div>
</div>

<!-- ==================== SOURCE CARD（原文出处，必填） ==================== -->
<div class="source-card">
  <div class="source-label">原文出处</div>
  <div class="source-row"><strong>原标题</strong>{{title_original}}</div>
  <div class="source-row"><strong>作者</strong>{{author_original}}</div>
  <div class="source-row"><strong>来源</strong>{{source_site}}</div>
  <div class="source-row"><strong>原文链接</strong><a href="{{source_url}}" target="_blank" rel="noopener">{{source_url}}</a></div>
  <div class="source-row"><strong>发布日期</strong>{{publish_date}}</div>
</div>

<!-- ==================== PROSE（译文正文） ==================== -->
<div class="prose">

<!-- 译者按语（可选，对长文/有背景的文章建议补充一段说明） -->
<div class="callout callout-note">
  <div class="callout-title">译者按</div>
  {{translator_intro}}
</div>

<!-- 正文从这里开始。严格按原文结构组织，h2 对应原文一级小标题。 -->
<h2 id="s1">{{section1_title}}</h2>
<p>{{section1_content}}</p>

<!-- 图片（外链原 CDN，图注译成中文）：放在原文对应位置 -->
<figure>
  <img src="{{image_src}}" alt="{{image_alt_zh}}" loading="lazy">
  <figcaption>{{image_caption_zh}}</figcaption>
</figure>

<!-- 视频（外链原 mp4，可直接播）：放在原文对应位置 -->
<figure>
  <video src="{{video_src}}" controls playsinline muted preload="metadata"></video>
  <figcaption>{{video_caption_zh}}</figcaption>
</figure>

<!-- 更多章节按原文结构续写：<h2 id="sN">…</h2> / <h3> / <p> / <ul> / <table> / <pre> / <blockquote> / <figure> 等 -->

</div><!-- /prose -->

<footer>
  <p>本文为译文，版权归原作者所有，仅供学习交流 &middot; &copy; 2026 元初AI</p>
</footer>
</div>
<script defer src="/tracker.js"></script>
</body>
</html>
