<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>面试提问 — {{candidate_name}} — {{position}}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f5f5;color:#1a1a1a;min-height:100vh;line-height:1.7;
}

/* ---- Header ---- */
.header{background:#1e293b;color:#fff;padding:18px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.header-inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.header h1{font-size:20px;font-weight:600;letter-spacing:1px;}
.header-meta{display:flex;gap:12px;font-size:13px;color:rgba(255,255,255,.7);margin-top:4px;flex-wrap:wrap;}
.header-meta span{background:rgba(255,255,255,.1);padding:2px 10px;border-radius:12px;}
.header-actions{display:flex;gap:8px;}
.header-actions button{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;transition:background .2s;}
.header-actions button:hover{background:rgba(255,255,255,.25);}

/* ---- Layout: sidebar + main ---- */
.layout{max-width:1200px;margin:0 auto;display:flex;gap:0;min-height:calc(100vh - 64px);}

/* ---- Left Sidebar Nav ---- */
.sidebar{width:200px;flex-shrink:0;padding:20px 0 20px 24px;position:sticky;top:64px;align-self:flex-start;max-height:calc(100vh - 64px);overflow-y:auto;overscroll-behavior:contain;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
.nav-section{margin-bottom:16px;}
.nav-section-title{font-size:11px;color:#94a3b8;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px;padding-left:10px;}
.nav-link{display:block;font-size:13px;color:#64748b;text-decoration:none;padding:5px 10px;border-radius:6px;border-left:2px solid transparent;transition:all .15s;line-height:1.5;margin-bottom:1px;}
.nav-link:hover{background:#e2e8f0;color:#1e293b;}
.nav-link.active{background:#eff6ff;color:#3b82f6;border-left-color:#3b82f6;font-weight:600;}
.nav-divider{height:1px;background:#e2e8f0;margin:12px 10px;}
.nav-link.flag{color:#dc2626;}
.nav-link.flag:hover{background:#fef2f2;}
.nav-link.flag.active{background:#fef2f2;border-left-color:#dc2626;}

/* ---- Main Content ---- */
.main{flex:1;min-width:0;padding:24px 24px 24px 20px;}

/* ---- Schedule ---- */
.schedule{background:#fff;border-radius:10px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.schedule h2{font-size:15px;font-weight:600;color:#64748b;letter-spacing:2px;margin-bottom:12px;}
.schedule table{width:100%;border-collapse:collapse;font-size:14px;}
.schedule th,.schedule td{padding:8px 12px;text-align:left;border-bottom:1px solid #f1f5f9;}
.schedule th{color:#94a3b8;font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:1px;}
.schedule tr:last-child td{border-bottom:none;}
.schedule .time{color:#3b82f6;font-weight:600;white-space:nowrap;}

/* ---- Section ---- */
.section{margin-bottom:20px;}
.section-header{background:#fff;border-radius:10px 10px 0 0;padding:16px 24px;border-bottom:2px solid #3b82f6;display:flex;justify-content:space-between;align-items:center;}
.section-header h2{font-size:17px;font-weight:600;color:#1e293b;}
.section-header .badge{font-size:12px;color:#3b82f6;background:#eff6ff;padding:2px 10px;border-radius:12px;font-weight:500;}
.section-body{background:#fff;border-radius:0 0 10px 10px;box-shadow:0 1px 3px rgba(0,0,0,.06);}

/* ---- Question Card ---- */
.question{padding:20px 24px;border-bottom:1px solid #f1f5f9;scroll-margin-top:80px;}
.question:last-child{border-bottom:none;}
.question-title{font-size:15px;font-weight:600;color:#1e293b;margin-bottom:10px;line-height:1.6;}
.question-title .q-num{color:#3b82f6;margin-right:6px;}
.question-details{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;margin-bottom:12px;}
.detail-item{font-size:13px;color:#64748b;line-height:1.6;}
.detail-item strong{color:#475569;font-weight:600;}
.detail-item.full{grid-column:1/-1;}
.followup{font-size:13px;margin-bottom:12px;}
.followup-row{display:flex;gap:12px;margin-top:4px;}
.followup-tag{font-size:11px;padding:1px 8px;border-radius:10px;font-weight:500;white-space:nowrap;flex-shrink:0;}
.followup-tag.good{background:#f0fdf4;color:#16a34a;}
.followup-tag.stuck{background:#fef2f2;color:#dc2626;}
.followup-text{color:#64748b;font-size:13px;}

/* ---- Notes textarea ---- */
.notes-area{width:100%;min-height:60px;border:1px dashed #d1d5db;border-radius:6px;padding:10px 12px;font-size:13px;font-family:inherit;color:#374151;resize:vertical;transition:border-color .2s;background:#fafafa;line-height:1.6;}
.notes-area:focus{outline:none;border-color:#3b82f6;background:#fff;box-shadow:0 0 0 2px rgba(59,130,246,.1);}
.notes-area::placeholder{color:#94a3b8;}
.notes-label{font-size:12px;color:#94a3b8;margin-bottom:4px;display:flex;align-items:center;gap:4px;}
.notes-label::before{content:'✏️';}

/* ---- Red Flags ---- */
.red-flags{background:#fff;border-radius:10px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #ef4444;scroll-margin-top:80px;}
.red-flags h2{font-size:15px;font-weight:600;color:#dc2626;margin-bottom:12px;letter-spacing:1px;}
.red-flags table{width:100%;border-collapse:collapse;font-size:13px;}
.red-flags th,.red-flags td{padding:8px 12px;text-align:left;border-bottom:1px solid #fef2f2;}
.red-flags th{color:#94a3b8;font-weight:500;font-size:12px;}
.red-flags tr:last-child td{border-bottom:none;}

/* ---- Overall Notes ---- */
.overall-notes{background:#fff;border-radius:10px;padding:20px 24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);scroll-margin-top:80px;}
.overall-notes h2{font-size:15px;font-weight:600;color:#64748b;letter-spacing:2px;margin-bottom:12px;}
.overall-notes .notes-area{min-height:120px;}

/* ---- Print ---- */
@media print{
  body{background:#fff;}
  .header{position:static;box-shadow:none;background:#1e293b;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .header-actions{display:none;}
  .sidebar{display:none;}
  .layout{display:block;}
  .main{padding:24px 0;}
  .notes-area{border:1px solid #d1d5db;min-height:80px;}
  .section-body,.schedule,.red-flags,.overall-notes{box-shadow:none;break-inside:avoid;}
  .question{break-inside:avoid;}
}

/* ---- Mobile ---- */
@media(max-width:860px){
  .sidebar{display:none;}
  .layout{display:block;}
  .main{padding:16px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div>
      <h1>面试提问 — {{candidate_name}}</h1>
      <div class="header-meta">
        <span>{{position}}</span>
        <span>{{level}}</span>
        <span>{{duration}}分钟</span>
        <span>{{date}}</span>
      </div>
    </div>
    <div class="header-actions">
      <button onclick="saveWithNotes()">保存记录</button>
      <button onclick="clearAllNotes()">清空记录</button>
      <button onclick="window.print()">打印</button>

<div class="layout">

  <!-- 左侧导航: 按维度分组，每个链接含编号+关键词，带 data-target 指向问题 id -->
  <nav class="sidebar">
    <div class="sidebar-nav">
      {{sidebar_nav}}

        <div class="nav-section-title">专业能力</div>
        <a class="nav-link" href="#q1" data-target="q1">Q1 关键词摘要</a>

      </div>
      <div class="nav-section">
        <div class="nav-section-title">业务知识</div>
        <a class="nav-link" href="#q3" data-target="q3">Q3 关键词摘要</a>
      </div>
      ... 依此类推 ...

      -->

  </nav>

  <!-- 主内容区 -->

    <!-- 面试节奏 -->

      <h2>面试节奏</h2>

        <tr><th>阶段</th><th>时间</th><th>内容</th><th>备注</th></tr>

    </div>

    <!-- 各维度问题区块: 按维度重复 section，每个 question 必须带 id="q{N}" -->
    {{sections}}
    <!--
    <div class="section">

        <span class="badge">~9min</span>

    <!-- 红旗追问清单 -->
    <div class="red-flags" id="red-flags">
      <h2>🚩 红旗追问清单</h2>
      <table>
        <tr><th></th><th>简历疑点</th><th>追问问题</th><th>判断标准</th></tr>
        {{red_flag_rows}}
      </table>
    </div>

    <!-- 综合评价 -->
    <div class="overall-notes" id="overall">
      <h2>综合评价</h2>
      <textarea class="notes-area" placeholder="面试结束后记录综合评价、是否推荐、关键判断依据..."></textarea>
    </div>

</div>

<script>
function saveWithNotes(){
  document.querySelectorAll('.notes-area').forEach(function(t){
    t.textContent=t.value;
    t.setAttribute('data-saved','1');
  });
  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=document.title.replace(/\s—\s/g,'-')+'.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function clearAllNotes(){
  if(!confirm('确定清空所有记录？此操作不可撤销。'))return;
  document.querySelectorAll('.notes-area').forEach(function(t){t.value='';t.textContent='';});
}

// Scroll-aware sidebar highlighting
(function(){
  var links=document.querySelectorAll('.sidebar-nav a[data-target]');
  var targets=[];
  links.forEach(function(a){
    var el=document.getElementById(a.dataset.target);
    if(el) targets.push({link:a,el:el});
  });
  function update(){
    var scrollY=window.scrollY+120;
    var active=null;
    for(var i=0;i<targets.length;i++){
      if(targets[i].el.offsetTop<=scrollY) active=targets[i];
    }
    links.forEach(function(a){a.classList.remove('active');});
    if(active) active.link.classList.add('active');
  }
  window.addEventListener('scroll',update,{passive:true});
  update();
})();
</script>
</body>
</html>
