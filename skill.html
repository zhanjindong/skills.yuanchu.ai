<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Detail - Skills Market - 元初AI</title>
    <meta name="description" content="AI Skill 详情 - Skills Market by 元初AI">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="index.html" class="nav-brand">
                <span class="terminal-prompt">~$</span> Skills Market
            </a>
            <div class="nav-links">
                <a href="about.html">About</a>
                <a href="https://yuanchu.ai" target="_blank">元初AI</a>
            </div>
        </div>
    </nav>

    <div class="content">

        <!-- Back Navigation -->
        <a href="index.html" class="back-nav">&larr; Back to Skills</a>

        <!-- Skill Detail -->
        <div id="skill-detail" class="skill-detail">

            <!-- Header: icon + name + meta (full width) -->
            <div id="skill-header" class="skill-detail-header"></div>

            <!-- Tags (full width) -->
            <div id="skill-tags" class="skill-detail-tags"></div>

            <!-- Two-column layout -->
            <div class="detail-layout">

                <!-- Left: content -->
                <div class="detail-main">
                    <div id="skill-description" class="skill-description"></div>
                    <div id="skill-examples" class="examples-section"></div>
                </div>

                <!-- Right: sidebar -->
                <div class="detail-sidebar">
                    <div id="skill-downloads" class="download-section">
                        <p class="section-title">DOWNLOAD</p>
                    </div>
                    <div id="skill-links" class="links-section"></div>
                    <div id="skill-meta-card" class="meta-card"></div>
                </div>

            </div>

            <!-- Related Skills (full width) -->
            <div id="skill-related" class="related-section">
                <p class="section-title">RELATED SKILLS</p>
                <div id="related-grid" class="related-grid"></div>
            </div>

        </div>

    </div>

    <footer>
        <p>&copy; 2026 <a href="https://yuanchu.ai" target="_blank">元初AI</a> &middot; ORIGIN OF INTELLIGENCE</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/app.js"></script>

</body>
</html>
