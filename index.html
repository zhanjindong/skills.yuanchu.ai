<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Market - 元初AI</title>
    <meta name="description" content="发现和下载有趣实用的 AI Skills，支持 Claude Code、Codex、OpenClaw 等多种 Agent 框架">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="top-nav-inner">
            <a href="index.html" class="nav-brand">
                <span class="terminal-prompt">~$</span> Skills Market
            </a>
            <div class="nav-links">
            </div>
        </div>
    </nav>

    <!-- Search Section — Terminal Window -->
    <div class="search-section">
        <div class="search-terminal">
            <div class="search-terminal-bar">
                <div class="window-dots">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </div>
                <span class="bar-title">search</span>
            </div>
            <div class="search-body">
                <span class="search-prefix">$ find</span>
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" placeholder="Search skills...">
            </div>
        </div>
    </div>

    <div class="content">

        <!-- Categories -->
        <div id="categories" class="categories">
            <!-- JS renders category tags here -->
        </div>

        <!-- Skills Grid -->
        <div id="skills-grid" class="skills-grid">
            <!-- JS renders skill cards here -->
        </div>

    </div>

    <footer>
        <p>&copy; 2026 <a href="https://yuanchu.ai" target="_blank">元初AI</a> &middot; ORIGIN OF INTELLIGENCE</p>
    </footer>

    <script src="assets/js/app.js"></script>

</body>
</html>
